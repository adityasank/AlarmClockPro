<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alarm Clock</title>

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f1f5f9;
    margin: 0;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 340px;
    text-align: center;
    position: relative;
  }

  .time {
    font-size: 22px;
    font-family: monospace;
    margin-bottom: 10px;
  }

  input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    -webkit-appearance: none;
    appearance: none;
  }

  button {
    border: none;
    color: white;
    cursor: pointer;
  }

  .set { background: #3b82f6; }
  .stop { background: #ef4444; }
  .camera { background: #22c55e; }
  .gray { background: #6b7280; }

  .disabled {
    background: #ccc !important;
    cursor: not-allowed;
    opacity: 0.7;
  }

  .row {
    display: flex;
    gap: 8px;
  }

  .row button {
    width: 50%;
  }

  video, canvas, img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
  }

  .progress {
    width: 100%;
    height: 8px;
    background: #e5e7eb;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
    display: none;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
  }

  .watermark {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(0,0,0,0.35);
    pointer-events: none;
  }

  /* MODAL */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 280px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>

<body>

<div class="card">

  <h2>Alarm Klock ⏰</h2>

  <div class="time" id="currentTime"></div>

  <input type="time" id="alarmInput"/>

  <button class="set" onclick="setAlarm()">Set Alarm</button>

  <div class="row">
    <button id="stopBtn" class="stop disabled" disabled onclick="openPayment()">Stop</button>
    <button id="cameraBtn" class="camera disabled" disabled onclick="startCamera()">Camera</button>
  </div>

  <button class="gray" onclick="clearAll()">Clear</button>

  <p id="alarmDisplay"></p>
  <p id="status"></p>

  <video id="video" autoplay playsinline style="display:none;"></video>

  <button id="captureBtn" class="camera" style="display:none;" onclick="captureImage()">
    Capture
  </button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" style="display:none;" />

  <div class="progress" id="progressBox">
    <div class="bar" id="progressBar"></div>
  </div>

  <div class="watermark">Designed by S Aditya D</div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="paymentModal">
  <div class="box">

    <h3>Pay $10 to stop alarm</h3>

    <div id="payForm">
      <input placeholder="Card Number" placeholder="Card Number"/>
      <input placeholder="Expiry Date" placeholder="MM/YY"/>
      <input placeholder="CVV" type="password"/>

      <button class="set" onclick="startPayment()">Pay Now</button>
      <button class="gray" onclick="closePayment()">Cancel</button>
    </div>

    <div id="payProcessing" style="display:none;">
      <div style="
        width:40px;
        height:40px;
        border:4px solid #ddd;
        border-top:4px solid #22c55e;
        border-radius:50%;
        margin:15px auto;
        animation: spin 1s linear infinite;
      "></div>
      <p>Processing payment...</p>
    </div>

    <div id="paySuccess" style="display:none;">
      <p style="color:green;font-weight:bold;">Payment Successful ✔</p>
      <p>Stopping alarm...</p>
    </div>

  </div>
</div>

<script>

let alarmTimeout;
let beepInterval;
let audioCtx;
let isRinging = false;
let stream;

/* CLOCK */
setInterval(() => {
  document.getElementById("currentTime").innerText =
    new Date().toLocaleTimeString();
}, 1000);

/* AUDIO */
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function playBeep() {
  initAudio();

  beepInterval = setInterval(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 1000;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  }, 300);
}

/* ENABLE BUTTONS */
function enableButtons() {
  document.getElementById("stopBtn").disabled = false;
  document.getElementById("cameraBtn").disabled = false;

  document.getElementById("stopBtn").classList.remove("disabled");
  document.getElementById("cameraBtn").classList.remove("disabled");
}

/* LOCK BUTTONS */
function lockControls() {
  document.getElementById("stopBtn").disabled = true;
  document.getElementById("cameraBtn").disabled = true;

  document.getElementById("stopBtn").classList.add("disabled");
  document.getElementById("cameraBtn").classList.add("disabled");
}

/* ALARM */
function setAlarm() {
  const value = document.getElementById("alarmInput").value;
  if (!value) return;

  const now = new Date();
  const alarm = new Date();

  const [h, m] = value.split(":");
  alarm.setHours(h);
  alarm.setMinutes(m);
  alarm.setSeconds(0);

  if (alarm < now) alarm.setDate(alarm.getDate() + 1);

  document.getElementById("alarmDisplay").innerText =
    "Alarm set for ⏰ " + alarm.toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });

  alarmTimeout = setTimeout(() => {
    isRinging = true;
    document.getElementById("status").innerText = "Wake up! ⏰";
    playBeep();
    enableButtons();
  }, alarm - now);
}

/* CAMERA */
async function startCamera() {
  if (!isRinging) return;

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  video.style.display = "block";
  document.getElementById("captureBtn").style.display = "block";
}

/* CAPTURE + ANALYSIS */
function captureImage() {

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const preview = document.getElementById("preview");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);

  preview.src = canvas.toDataURL("image/png");
  preview.style.display = "block";

  video.style.display = "none";
  document.getElementById("captureBtn").style.display = "none";

  if (stream) stream.getTracks().forEach(t => t.stop());

  const box = document.getElementById("progressBox");
  const bar = document.getElementById("progressBar");
  const status = document.getElementById("status");

  box.style.display = "block";

  let progress = 0;

  const interval = setInterval(() => {

    progress += 10;
    bar.style.width = progress + "%";

    
    const msgs = [
  "Analyzing image...",
  "Scanning 3D image data...",
  "NASA AI processing...",
  "Toothbrush detected ✔ stopping alarm..."
];

status.innerText = msgs[Math.min(Math.floor(progress / 25), msgs.length - 1)];

    if (progress >= 100) {
      clearInterval(interval);

      clearInterval(beepInterval);
      clearTimeout(alarmTimeout);
      isRinging = false;

      lockControls();

      /* ✅ FIX: CLEAR ALARM TEXT HERE */
      document.getElementById("alarmDisplay").innerText = "";

      setTimeout(() => {
        box.style.display = "none";
        bar.style.width = "0%";
      }, 1000);
    }

  }, 450);
}

/* PAYMENT */
function openPayment() {
  document.getElementById("paymentModal").style.display = "flex";

  document.getElementById("payForm").style.display = "block";
  document.getElementById("payProcessing").style.display = "none";
  document.getElementById("paySuccess").style.display = "none";
}

function closePayment() {
  document.getElementById("paymentModal").style.display = "none";
}

function startPayment() {

  document.getElementById("payForm").style.display = "none";
  document.getElementById("payProcessing").style.display = "block";

  setTimeout(() => {

    document.getElementById("payProcessing").style.display = "none";
    document.getElementById("paySuccess").style.display = "block";

    setTimeout(() => {

      document.getElementById("paymentModal").style.display = "none";

      clearInterval(beepInterval);
      clearTimeout(alarmTimeout);
      isRinging = false;

      lockControls();

      /* ✅ FIX: CLEAR ALARM TEXT HERE TOO */
      document.getElementById("alarmDisplay").innerText = "";

      document.getElementById("status").innerText =
        "Alarm stopped via payment 💳";

    }, 1200);

  }, 3000);
}

/* CLEAR */
function clearAll() {
  document.getElementById("alarmDisplay").innerText = "";
  document.getElementById("status").innerText = "";
  document.getElementById("alarmInput").value = "";

  if (stream) stream.getTracks().forEach(t => t.stop());

  document.getElementById("video").style.display = "none";
  document.getElementById("captureBtn").style.display = "none";
  document.getElementById("preview").style.display = "none";
}

</script>

</body>
</html>
