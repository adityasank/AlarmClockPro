<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alarm Clock</title>

<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f1f5f9;
    margin: 0;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    width: 340px;
    text-align: center;
    position: relative;
  }

  .time {
    font-size: 22px;
    font-family: monospace;
    margin-bottom: 10px;
  }

  input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  button {
    border: none;
    color: white;
    cursor: pointer;
  }

  .set { background: #3b82f6; }
  .stop { background: #ef4444; }
  .camera { background: #22c55e; }
  .gray { background: #6b7280; }
  .disabled { background: #ccc; cursor: not-allowed; }

  .row {
    display: flex;
    gap: 8px;
  }

  .row button {
    width: 50%;
  }

  video, canvas, img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
  }

  .progress {
    width: 100%;
    height: 8px;
    background: #e5e7eb;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
    display: none;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
  }

  .watermark {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(0,0,0,0.35);
    pointer-events: none;
  }

  /* MODAL */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 280px;
    text-align: center;
  }

  /* SPINNER */
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>

<body>

<div class="card">

  <h2>Alarm Clock</h2>

  <div class="time" id="currentTime"></div>

  <input type="time" id="alarmInput"/>

  <button class="set" onclick="setAlarm()">Set Alarm</button>

  <div class="row">
    <button id="stopBtn" class="stop disabled" disabled onclick="openPayment()">Stop</button>
    <button id="cameraBtn" class="camera disabled" disabled onclick="startCamera()">Camera</button>
  </div>

  <button class="gray" onclick="clearAll()">Clear</button>

  <p id="alarmDisplay"></p>
  <p id="status"></p>

  <video id="video" autoplay playsinline style="display:none;"></video>

  <button id="captureBtn" class="camera" style="display:none;" onclick="captureImage()">
    Capture
  </button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" style="display:none;" />

  <div class="progress" id="progressBox">
    <div class="bar" id="progressBar"></div>
  </div>

  <div class="watermark">Designed by S Aditya D</div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal" id="paymentModal">
  <div class="box">
    <h3>Pay ₹10 to stop alarm</h3>

    <input placeholder="Card Number"/>
    <input placeholder="Expiry Date"/>
    <input placeholder="CVV"/>

    <button class="set" onclick="payNow()">Pay Now</button>
    <button class="gray" onclick="closePayment()">Cancel</button>
  </div>
</div>

<script>

let alarmTimeout;
let beepInterval;
let isRinging = false;
let stream;

/* CLOCK */
setInterval(() => {
  document.getElementById("currentTime").innerText =
    new Date().toLocaleTimeString();
}, 1000);

/* BEEP */
function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  beepInterval = setInterval(() => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.value = 1000;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  }, 300);
}

/* ENABLE BUTTONS */
function enableButtons() {
  document.getElementById("stopBtn").disabled = false;
  document.getElementById("cameraBtn").disabled = false;

  document.getElementById("stopBtn").classList.remove("disabled");
  document.getElementById("cameraBtn").classList.remove("disabled");
}

/* ALARM */
function setAlarm() {
  const value = document.getElementById("alarmInput").value;
  if (!value) return;

  const now = new Date();
  const alarm = new Date();

  const [h, m] = value.split(":");
  alarm.setHours(h);
  alarm.setMinutes(m);
  alarm.setSeconds(0);

  if (alarm < now) alarm.setDate(alarm.getDate() + 1);

  document.getElementById("alarmDisplay").innerText =
    "Alarm set for ⏰ " + alarm.toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });

  alarmTimeout = setTimeout(() => {
    isRinging = true;
    document.getElementById("status").innerText = "Wake up! ⏰";

    playBeep();
    enableButtons();

  }, alarm - now);
}

/* CAMERA */
async function startCamera() {
  if (!isRinging) return;

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  video.style.display = "block";
  document.getElementById("captureBtn").style.display = "block";
}

/* CAPTURE + ANALYSIS FIXED */
function captureImage() {

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const preview = document.getElementById("preview");

  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  preview.src = canvas.toDataURL("image/png");
  preview.style.display = "block";

  // stop camera instantly
  video.style.display = "none";
  document.getElementById("captureBtn").style.display = "none";

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  const progressBox = document.getElementById("progressBox");
  const progressBar = document.getElementById("progressBar");
  const status = document.getElementById("status");

  progressBox.style.display = "block";

  const steps = [
    "Analyzing image...",
    "Connecting NASA vision system...",
    "Scanning toothbrush pattern...",
    "Toothbrush detected ✔ Stopping alarm..."
  ];

  let i = 0;
  let progress = 0;

  const interval = setInterval(() => {

    progress += 10;
    progressBar.style.width = progress + "%";

    if (i < steps.length) {
      status.innerText = steps[i];
      i++;
    }

    if (progress >= 100) {
      clearInterval(interval);

      clearInterval(beepInterval);
      clearTimeout(alarmTimeout);
      isRinging = false;

      status.innerText = "Alarm stopped ✔";

      setTimeout(() => {
        progressBox.style.display = "none";
        progressBar.style.width = "0%";
      }, 1200);
    }

  }, 250);
}

/* PAYMENT */
function openPayment() {
  document.getElementById("paymentModal").style.display = "flex";
}

function closePayment() {
  document.getElementById("paymentModal").style.display = "none";
}

function payNow() {
  document.getElementById("paymentModal").style.display = "none";

  setTimeout(() => {
    clearInterval(beepInterval);
    clearTimeout(alarmTimeout);
    isRinging = false;

    document.getElementById("status").innerText =
      "Alarm stopped via payment 💳";
  }, 2000);
}

/* CLEAR */
function clearAll() {
  document.getElementById("alarmDisplay").innerText = "";
  document.getElementById("status").innerText = "";
  document.getElementById("alarmInput").value = "";

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  document.getElementById("video").style.display = "none";
  document.getElementById("captureBtn").style.display = "none";
  document.getElementById("preview").style.display = "none";
}

</script>

</body>
</html>
